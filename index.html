<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a73e8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="description" content="Han Laptop POS - Aplikasi kasir, inventaris toko, dan akuntansi keuangan terpadu untuk retail laptop." />
    <title>Han Laptop POS</title>
  </head>
  <body>
    <div id="root">
      <div style="display:flex;height:100vh;width:100vw;align-items:center;justify-content:center;background-color:#0f172a;flex-direction:column;">
        <img src="/icon-192.png" alt="Han Laptop Logo" style="width:100px;height:100px;object-fit:contain;margin-bottom:24px;border-radius:20px;box-shadow:0 10px 25px rgba(6, 182, 212, 0.2);" />
        <div style="width:32px;height:32px;border:3px solid #e2e8f0;border-top:3px solid #06b6d4;border-radius:50%;animation:spin 1s linear infinite;"></div>
        <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
