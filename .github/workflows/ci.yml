name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for legacy tenant isolation patterns (storeId !== "all" ? eq...)
        run: |
          if grep -rn "storeId !== \"all\" ? eq" src/app/api; then
            echo "Error: Found legacy tenant isolation pattern (storeId !== \"all\" ? eq). Use storeScope() from @/lib/auth-guard instead."
            exit 1
          fi

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration
        env:
          TEST_DATABASE_URL: "postgres://postgres:postgres@localhost:5432/postgres"

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Multi-Tenant Isolation)
        run: npm run test:e2e
        env:
          TEST_DATABASE_URL: "postgres://postgres:postgres@localhost:5432/postgres"

      - name: Build backend
        run: npm run build
        env:
          DATABASE_URL: "postgres://postgres:postgres@localhost:5432/postgres"
          BETTER_AUTH_SECRET: "ci-test-secret-not-for-production"
